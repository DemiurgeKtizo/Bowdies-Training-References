<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery — Bowdie's</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #171513; color: #F0E8D8; font-family: Georgia, serif; }
    main { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; padding: 32px; text-align: center; box-sizing: border-box; }
    .eyebrow { font-family: sans-serif; font-size: 9px; letter-spacing: 0.4em; text-transform: uppercase; color: #C9A84C; margin-bottom: 14px; }
    .title { font-size: 22px; font-weight: 600; line-height: 1.3; margin-bottom: 16px; max-width: 420px; }
    .body { font-size: 15px; line-height: 1.5; color: #8A8070; max-width: 380px; margin-bottom: 28px; }
    .cta { display: inline-block; color: #C9A84C; border: 1px solid #8A6B2A; padding: 14px 28px; font-family: sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Recovery Mode</div>
    <div class="title">Reload loop detected.</div>
    <div class="body">Local data has been cleared. Tap below when you're ready &mdash; the site will boot fresh on the next load.</div>
    <a class="cta" id="continue-btn" href="index.html?recovered=1">Continue</a>
  </main>
  <script>
    // Belt-and-suspenders: clear storage on this page too. If we got here
    // by direct redirect from index.html's loop guard, storage is already
    // cleared. If a user lands here some other way, we still ensure they
    // start fresh.
    try { localStorage.clear(); } catch (e) {}
    try { sessionStorage.clear(); } catch (e) {}
  </script>
</body>
</html>
